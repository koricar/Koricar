kind = "web"
previewPath = "/"
title = "Korean Car Search"
version = "1.0.0"
id = "artifacts/korean-car-search"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25146

[services.development]
run = "pnpm --filter @workspace/korean-car-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/korean-car-search", "run", "build" ]
publicDir = "artifacts/korean-car-search/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25146"
BASE_PATH = "/"
